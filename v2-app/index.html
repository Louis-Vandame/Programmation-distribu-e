<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MyService Version 2</title>
</head>
<body style="text-align: center; font-family: Arial, sans-serif; margin-top: 50px; background-color: #f0f8ff;">
    <h1 style="color: #333;">Welcome to Version 2! 🚀</h1>
    
    <h2 id="clock" style="color: #0066cc;"></h2>
    
    <img src="https://picsum.photos/400/300" alt="Random Image" style="border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">

    <script>
        // Simple script to update the time every second
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
